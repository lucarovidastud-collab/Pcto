<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteGen - Area Riservata</title>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }

        body {
            background: var(--bg-grad);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease-out;
        }

        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; background: linear-gradient(to right, #3b82f6, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; }

        .tabs { display: flex; gap: 10px; margin-bottom: 24px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; color: var(--text-muted); font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { background: var(--accent); color: white; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input {
            width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.6); border: 1.5px solid var(--border-color);
            border-radius: 10px; color: white; font-size: 1rem; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); background: rgba(15, 23, 42, 0.8); }

        .btn-submit { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: var(--accent-hover); transform: translateY(-1px); }

        .divider { display: flex; align-items: center; text-align: center; margin: 24px 0; color: var(--text-muted); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-google {
            width: 100%; padding: 12px; background: white; color: #1e293b; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s;
        }
        .btn-google:hover { background: #f1f5f9; transform: translateY(-1px); }
        .btn-google img { width: 20px; height: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1>QuoteGen Engine</h1>
        <p id="auth-subtitle">Accedi per gestire i tuoi preventivi</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-login">Accedi</button>
        <button class="tab-btn" id="tab-register">Registrati</button>
    </div>

    <form id="auth-form">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="tuo@esempio.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-submit" id="btn-text">Accedi</button>
    </form>

    <div class="divider">oppure</div>

    <button id="btn-google" class="btn-google-login" style="display: inline-flex !important; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px" style="flex-shrink: 0;">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v9.09h12.67c-.55 2.87-2.17 5.31-4.61 6.94l7.19 5.57C43.43 36.32 46.5 30.73 46.5 24z"/>
        <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.19-5.57c-1.99 1.33-4.55 2.13-7.7 2.13-6.26 0-11.57-4.22-13.46-10l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    <span>Accedi con Google</span>
    </button>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
