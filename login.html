<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteGen - Accesso</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="auth-container anim-fade-in">
        <div class="auth-box">
            <h2 id="auth-title">Accedi a QuoteGen</h2>
            <p id="auth-subtitle">Inserisci le tue credenziali per gestire i preventivi</p>
            
            <form id="auth-form">
                <div class="form-group">
                    <label for="auth-email">Email Aziendale</label>
                    <input type="email" id="auth-email" required placeholder="nome@azienda.it">
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required placeholder="••••••••">
                </div>
                
                <button type="submit" id="btn-auth-submit" class="btn-primary">Accedi</button>
            </form>
            
            <div class="auth-switch">
                <p id="switch-text">Non hai un account? <a href="#" id="link-switch">Registrati</a></p>
            </div>
            <div id="auth-error" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
